name: Organize Problems
on:
  push:
    paths:
      - 'new_problems/*.json'
jobs:
  organize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Organize Problem
        run: |
          # Read the JSON file
          json_file=$(ls new_problems/*.json | head -n 1)
          type=$(jq -r '.type' "$json_file")
          difficulty=$(jq -r '.difficulty' "$json_file")
          question=$(jq -r '.question' "$json_file")
          solution=$(jq -r '.solution' "$json_file")
          insight=$(jq -r '.insight' "$json_file")

          # Create folder structure
          mkdir -p "$type/$difficulty"

          # Create files
          echo "$question" > "$type/$difficulty/question.md"
          echo "$solution" > "$type/$difficulty/solution.${type}"
          echo "$insight" > "$type/$difficulty/insight.md"

          # Remove the JSON file
          rm "$json_file"

          # Commit changes
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add .
          git commit -m "Add new $type $difficulty problem"
          git push
